<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>認証成功 - Maidbot</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 星空アニメーション：仕様に基づき全実装 */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: -1;
        }
        
        .stars:after {
            content: "";
            position: absolute;
            top: -10rem;
            left: -10rem;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: starsAnim 100s linear infinite;
            opacity: 0.5;
        }

        @keyframes starsAnim {
            from { transform: translateY(0); }
            to { transform: translateY(-100px); }
        }

        .container {
            text-align: center;
            z-index: 1;
            padding: 20px;
        }

        /* ユーザー指定のタグ構造に合わせたスタイル */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #43b581;
        }

        p {
            margin-bottom: 30px;
            color: #b9bbbe;
        }

        /* 横並びボタンのコンテナ：display: flex; gap: 15px; flex-wrap: wrap; を適用 */
        .buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .buttons a {
            padding: 15px 25px;
            font-size: 1rem;
            font-weight: bold;
            text-decoration: none;
            color: white;
            border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
            min-width: 200px;
            display: inline-block;
            text-align: center;
        }

        .buttons a:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(114, 137, 218, 0.4);
        }

        /* サポートサーバーボタン (1つ目のaタグ) */
        .buttons a:nth-child(1) {
            background-color: #5865F2;
        }

        /* 導入ボタン (2つ目のaタグ) */
        .buttons a:nth-child(2) {
            background-color: #43b581;
        }

        /* スマホ対応：幅が狭い時に自動で縦に積む */
        @media (max-width: 600px) {
            .buttons a {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <h1>✅認証完了</h1>
        <p>このページは閉じていただいて大丈夫です。</p>
        <div class="buttons">
            <a href="https://discord.gg/FUAFeusY6F" target="_blank">サポートサーバー</a>
            <a href="https://discord.com/oauth2/authorize?client_id=1352238055012040828&permissions=8&integration_type=0&scope=bot" target="_blank">導入</a>
        </div>
    </div>
</body>
</html>
