<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>認証完了</title>
<style>
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; color:#fff; font-family:sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    canvas { position:absolute; top:0; left:0; width:100%; height:100%; }
    h1 { z-index:1; font-size:3em; margin:0; }
    p { z-index:1; font-size:0.8em; margin-top:0.5em; }
    .buttons { z-index:1; margin-top:1em; display:flex; gap:1em; }
    .buttons a { padding:0.5em 1em; background:#1a73e8; color:#fff; text-decoration:none; border-radius:5px; transition:0.2s; }
    .buttons a:hover { background:#155ab6; }
</style>
</head>
<body>
<canvas id="stars"></canvas>
<h1>✅認証完了</h1>
<p>このページは閉じていただいて大丈夫です。</p>
<div class="buttons">
    <a href="https://discord.gg/FUAFeusY6F" target="_blank">サポートサーバー</a>
    <a href="https://discord.com/oauth2/authorize?client_id=1352238055012040828&permissions=8&integration_type=0&scope=bot" target="_blank">導入</a>
</div>
<script>
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const stars = [];
for(let i=0;i<200;i++){
    stars.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        radius: Math.random()*1.2,
        vx: (Math.random()-0.5)*0.2,
        vy: (Math.random()-0.5)*0.2
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let s of stars){
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.radius,0,Math.PI*2);
        ctx.fillStyle = "#fff";
        ctx.fill();
        s.x += s.vx;
        s.y += s.vy;
        if(s.x<0)s.x=canvas.width;
        if(s.x>canvas.width)s.x=0;
        if(s.y<0)s.y=canvas.height;
        if(s.y>canvas.height)s.y=0;
    }
    requestAnimationFrame(animate);
}
animate();
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
</script>
</body>
</html>
