<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>認証成功 | MaidBot</title>
    <style>
        body { 
            margin: 0; 
            background: #0b0e14; 
            color: white; 
            font-family: sans-serif; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }

        /* 星空背景アニメーション */
        .stars { 
            position: absolute; 
            width: 200%; 
            height: 200%; 
            background: url('https://www.transparenttextures.com/patterns/stardust.png'); 
            animation: move 100s linear infinite; 
            z-index: -1; 
            opacity: 0.5; 
        }

        @keyframes move { 
            from { transform: translate(0, 0); } 
            to { transform: translate(-50%, -50%); } 
        }

        /* カードデザイン */
        .card { 
            background: rgba(43, 45, 49, 0.9); 
            padding: 50px; 
            border-radius: 20px; 
            text-align: center; 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
        }

        h1 { color: #57F287; font-size: 2.5em; margin-bottom: 10px; }
        p { color: #b5bac1; margin-bottom: 30px; font-size: 1.1em; }

        /* ボタン */
        .btn-group { display: flex; gap: 10px; justify-content: center; }
        .btn { 
            padding: 12px 25px; 
            border-radius: 8px; 
            text-decoration: none; 
            color: white; 
            font-weight: bold; 
            transition: 0.3s; 
        }
        .primary { background: #5865F2; } 
        .secondary { background: #4e5058; }
        .btn:hover { opacity: 0.8; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="card">
        <h1>✅ 認証成功</h1>
        <p>サーバーへの参加・役職付与が完了しました。</p>
        <div class="btn-group">
            <a href="https://discord.gg/SUPPORT" class="btn secondary">サポート</a>
            <a href="https://discord.com/api/oauth2/authorize?client_id={{CLIENT_ID}}&permissions=8&scope=bot%20applications.commands" class="btn primary">ボットを導入</a>
        </div>
    </div>
</body>
</html>
