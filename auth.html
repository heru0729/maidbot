<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>認証完了</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100%;
    font-family: Arial, sans-serif;
    color: white;
    background: black;
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
  }

  .container {
    position: relative;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
  }

  h1 {
    font-size: 2em;
    text-align: center;
  }

  .button {
    padding: 12px 24px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #7289da;
    color: white;
    transition: background 0.3s;
    text-decoration: none;
  }

  .button:hover {
    background: #5b6eae;
  }
</style>
</head>
<body>
<canvas id="stars"></canvas>

<div class="container">
  <h1>✅ 認証完了</h1>
  <div>
    <a class="button" href="https://discord.gg/FUAFeusY6F" target="_blank">サポートサーバー</a>
    <a class="button" href="https://discord.com/oauth2/authorize?client_id=1352238055012040828&permissions=8&integration_type=0&scope=bot" target="_blank">導入</a>
  </div>
</div>

<script>
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const stars = [];
const STAR_COUNT = 150;

for(let i = 0; i < STAR_COUNT; i++){
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    radius: Math.random() * 1.5,
    speed: Math.random() * 0.5
  });
}

function animate() {
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  
  ctx.fillStyle = 'white';
  stars.forEach(star => {
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
    ctx.fill();
    
    star.y -= star.speed;
    if(star.y < 0) star.y = canvas.height;
  });
  
  requestAnimationFrame(animate);
}

animate();

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
</body>
</html>
