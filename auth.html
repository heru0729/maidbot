<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>認証完了</title>
<style>
  /* 星空背景 */
  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
  }

  h1 {
    font-size: 3rem;
    margin-bottom: 0.5rem;
  }

  p {
    font-size: 0.8rem;
    margin-bottom: 2rem;
  }

  .buttons {
    display: flex;
    gap: 1rem;
  }

  .buttons a {
    text-decoration: none;
    color: white;
    background-color: #5865F2;
    padding: 0.8rem 1.2rem;
    border-radius: 5px;
    font-weight: bold;
    transition: 0.2s;
  }

  .buttons a:hover {
    background-color: #4752c4;
  }
</style>
</head>
<body>

<h1>認証完了 ✅</h1>
<p style="font-size:0.7rem;">このページは閉じていただいて大丈夫です。</p>

<div class="buttons">
  <a href="https://discord.gg/FUAFeusY6F" target="_blank">サポートサーバー</a>
  <a href="https://discord.com/oauth2/authorize?client_id=1352238055012040828&permissions=8&integration_type=0&scope=bot" target="_blank">導入</a>
</div>

<canvas id="starfield"></canvas>

<script>
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let stars = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function createStars(count) {
  stars = [];
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      radius: Math.random() * 1.5,
      speed: Math.random() * 0.5 + 0.1
    });
  }
}
createStars(200);

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = 'white';
  stars.forEach(star => {
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
    ctx.fill();
    star.y += star.speed;
    if (star.y > canvas.height) star.y = 0;
  });
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
